name: resman

on:
  push:
    branches: [master]
    paths: ['auto_research_task/resman/**', '.github/workflows/resman.yml']
  pull_request:
    paths: ['auto_research_task/resman/**', '.github/workflows/resman.yml']

jobs:
  test:
    name: test / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        working-directory: auto_research_task/resman
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: auto_research_task/resman
      - name: fmt
        run: cargo fmt --check
      - name: clippy
        run: cargo clippy --release --all-targets -- -D warnings
      - name: test
        run: cargo test --release
      - name: smoke
        shell: bash
        run: |
          export RESMAN_HOME="$RUNNER_TEMP/resman"
          cargo run --release -- init
          cargo run --release -- import examples/sample-results.tsv -t ci
          best=$(cargo run --release --quiet -- best -f value)
          test -n "$best"
          cargo run --release -- report "$RUNNER_TEMP/out.html"
          test -s "$RUNNER_TEMP/out.html"

  release:
    name: release / ${{ matrix.target }}
    if: startsWith(github.ref, 'refs/tags/resman-v')
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            ext: ''
          - target: aarch64-apple-darwin
            os: macos-latest
            ext: ''
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            ext: '.exe'
    defaults:
      run:
        working-directory: auto_research_task/resman
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: auto_research_task/resman
      - name: build
        run: cargo build --release --target ${{ matrix.target }}
      - name: package
        shell: bash
        run: |
          bin="target/${{ matrix.target }}/release/resman${{ matrix.ext }}"
          name="resman-${GITHUB_REF_NAME#resman-}-${{ matrix.target }}"
          mkdir -p "dist/$name"
          cp "$bin" "dist/$name/"
          cp README.md LICENSE CHANGELOG.md "dist/$name/"
          cd dist
          if [[ "${{ matrix.ext }}" == ".exe" ]]; then
            7z a "$name.zip" "$name"
          else
            tar czf "$name.tar.gz" "$name"
          fi
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            auto_research_task/resman/dist/*.tar.gz
            auto_research_task/resman/dist/*.zip
